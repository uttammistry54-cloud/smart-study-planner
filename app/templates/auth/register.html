{% extends "base.html" %}
{% block title %}Sign Up - Smart Study Planner{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-icon">📘</span>
            <h1>Smart Study Planner</h1>
        </div>
        <p class="auth-subtitle">Create an account to start planning smarter.</p>

        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <p class="auth-switch">
            Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
