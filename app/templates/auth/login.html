{% extends "base.html" %}
{% block title %}Login - Smart Study Planner{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-icon">📘</span>
            <h1>Smart Study Planner</h1>
        </div>
        <p class="auth-subtitle">Welcome back! Log in to continue your study journey.</p>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group form-row">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>

        <p class="auth-switch">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
